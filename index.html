        margin: { l: 60, r: 40, t: 50, b: 50 },
        height: 350,
        hovermode: 'x unified',
    };
    Plotly.newPlot('chart-' + metric, [trace], layout, { responsive: true });
}

function makeAvgChart(metric) {
    const d = data[metric];
    const traces = [];
    const shapes = [...d.shapes.filter(s => s.type === 'rect')]; // keep bands only
    const annotations = [...d.annotations.filter(a => !a.showarrow && a.xanchor === 'right')]; // band labels only

    // Pre-compute label positions: near bar if single segment, centered in period if multiple
    // Use group-aware keys for no-device so each group gets its own label
    const groupSegs = {};
    d.avg_segments.forEach(seg => {
        const key = seg.is_no_device ? ('no_device_' + seg.no_device_group) : seg.label;
        if (!groupSegs[key]) groupSegs[key] = [];
        groupSegs[key].push(seg);
    });
    const labelPos = {};
    Object.keys(groupSegs).forEach(key => {
        const segs = groupSegs[key];
        if (segs.length === 1) {
            const mid = new Date((new Date(segs[0].x0).getTime() + new Date(segs[0].x1).getTime()) / 2);
            labelPos[key] = mid.toISOString().split('T')[0];
        } else {
            labelPos[key] = segs[0].period_mid;
        }
    });

    // Draw horizontal line segments for each period average
    const labelShown = {};
    d.avg_segments.forEach(seg => {
        const color = seg.is_no_device ? '#888' : '#2563eb';
        const dash = seg.is_no_device ? 'dash' : 'solid';
        const isSingleNight = (seg.x0 === seg.x1);
        let x0 = seg.x0, x1 = seg.x1;
        if (isSingleNight) {
            const dt = new Date(seg.x0 + 'T00:00:00');
            x0 = new Date(dt.getTime() - 12*60*60*1000).toISOString().slice(0, 16);
            x1 = new Date(dt.getTime() + 12*60*60*1000).toISOString().slice(0, 16);
        }
        traces.push({
            x: [x0, x1],
            y: [seg.y, seg.y],
            type: 'scatter',
            mode: 'lines',
            line: { color: color, width: 3, dash: dash },
            hovertemplate: seg.label + '<br>Avg ' + d.ylabel + ': ' + seg.y + ' (n=' + seg.n + ')<extra></extra>',
            showlegend: false,
        });
        // One label per merged period (group-aware for no-device)
        const labelKey = seg.is_no_device ? ('no_device_' + seg.no_device_group) : seg.label;
        if (!labelShown[labelKey]) {
            labelShown[labelKey] = true;
            annotations.push({
                x: labelPos[labelKey],
                y: seg.y,
                text: '' + seg.y,
                showarrow: false,
                yshift: 12,
                font: { size: 10, color: color },
                bgcolor: 'rgba(255,255,255,0.8)',
                borderpad: 2,
            });
        }
    });

    // Add boundary lines
    d.shapes.filter(s => s.type === 'line').forEach(s => shapes.push(s));
    // Add setting labels and no-device labels
    d.annotations.filter(a => !a.xanchor || a.xanchor !== 'right').forEach(a => annotations.push(a));

    const layout = {
        title: { text: d.title + ' (Period Averages)', font: { size: 16 } },
        xaxis: { title: 'Night Of', type: 'date', tickformat: '%b %d', dtick: 7 * 86400000, range: [d.date_range_min, d.date_range_max] },
        yaxis: { title: d.ylabel, range: [0, d.ymax], fixedrange: false },
        shapes: shapes,
        annotations: annotations,
        margin: { l: 60, r: 40, t: 50, b: 50 },
        height: 350,
        hovermode: 'x unified',
    };
    Plotly.newPlot('chart-avg-' + metric, traces, layout, { responsive: true });
}

metrics.forEach(m => { makeNightlyChart(m); makeAvgChart(m); });
</script>
